<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Transfer Ownership - LandChain</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
</head>
<body>
    <header class="navbar">
        <div class="brand">LandChain</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html">Register</a>
            <a href="login.html">Login</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main class="page form-page">
        <section class="form-card">
            <h1>Transfer Land Ownership</h1>
            <p>Link a new transaction block to the previous one with the buyer and seller details.</p>
            <form id="transferForm" action="transfer.php" method="post">
                <label for="land_id">Land ID</label>
                <input type="number" id="land_id" name="land_id" placeholder="Land ID from database" required />

                <label for="buyer">Buyer Name</label>
                <input type="text" id="buyer" name="buyer" placeholder="New Owner Name" required />

                <button type="submit" class="btn btn-primary">Transfer Ownership</button>
            </form>
        </section>
    </main>

    <footer class="footer">
        <p>Blockchain-Based Land Registration System &copy; 2026</p>
    </footer>
</body>
</html>
