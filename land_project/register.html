<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Register - LandChain</title>
    <link rel="stylesheet" href="css/style.css" />
    <script src="js/script.js" defer></script>
</head>
<body>
    <header class="navbar">
        <div class="brand">LandChain</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="register.html" class="active">Register</a>
            <a href="login.html">Login</a>
            <a href="dashboard.html">Dashboard</a>
        </nav>
    </header>

    <main class="page form-page">
        <section class="form-card">
            <h1>Create an Account</h1>
            <p>Register to access the land registration dashboard.</p>
            <form id="registerForm" action="register.php" method="post">
                <label for="name">Full Name</label>
                <input type="text" id="name" name="name" placeholder="John Doe" required />

                <label for="email">Email Address</label>
                <input type="email" id="email" name="email" placeholder="john@example.com" required />

                <label for="password">Password</label>
                <input type="password" id="password" name="password" placeholder="Create a strong password" required minlength="6" />

                <button type="submit" class="btn btn-primary">Register</button>
            </form>
            <p class="small-text">Already have an account? <a href="login.html">Login here</a>.</p>
        </section>
    </main>

    <footer class="footer">
        <p>Blockchain-Based Land Registration System &copy; 2026</p>
    </footer>
</body>
</html>
